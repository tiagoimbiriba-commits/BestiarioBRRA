<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Bestiário BR – Saci AR</title>

  <!-- A-Frame primeiro, depois MindAR -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<script>
AFRAME.registerComponent('gesture-handler', {
  schema: { minScale: {default: 0.5}, maxScale: {default: 10} },
  init: function() {
    this.scaleFactor = 1;
    this.el.sceneEl.addEventListener('touchmove', this.onTouchMove.bind(this));
  },
  onTouchMove: function(e) {
    if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (this.lastDist) {
        const delta = dist / this.lastDist;
        this.scaleFactor = Math.min(Math.max(this.scaleFactor * delta, 0.5), 10);
        const s = this.scaleFactor * 2.5;
        this.el.object3D.scale.set(s, s, s);
      }
      this.lastDist = dist;
    } else { this.lastDist = null; }
  }
});
</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Crimson+Pro:ital,wght@0,400;0,600&display=swap" rel="stylesheet" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Crimson Pro', serif;
      background: #0d1f18;
      color: #f2e8d5;
      height: 100dvh;
      overflow: hidden;
    }

    #intro {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: radial-gradient(ellipse at center, #1a3a2a 0%, #0a1510 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 40px 32px;
      text-align: center;
    }

    .logo {
      font-family: 'Cinzel Decorative', cursive;
      font-size: 1.5rem;
      color: #f0d080;
      text-shadow: 0 0 20px rgba(201,168,76,0.5);
      line-height: 1.2;
    }

    .logo span { color: #52b788; }

    .criatura {
      font-family: 'Cinzel Decorative', cursive;
      font-size: 1.1rem;
      color: #c0392b;
      letter-spacing: 3px;
      text-shadow: 0 0 15px rgba(192,57,43,0.6);
    }

    .card-preview {
      width: 130px;
      border-radius: 8px;
      border: 2px solid rgba(201,168,76,0.4);
      box-shadow: 0 0 20px rgba(201,168,76,0.2);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-8px); }
    }

    .instrucao {
      font-size: 1rem;
      font-style: italic;
      color: rgba(242,232,213,0.7);
      line-height: 1.6;
      max-width: 300px;
    }

    .start-btn {
      background: linear-gradient(135deg, #7b1a0e, #3a0a06);
      color: #f0d080;
      border: 1px solid #c0392b;
      border-radius: 4px;
      font-family: 'Cinzel Decorative', cursive;
      font-size: 0.8rem;
      font-weight: 700;
      padding: 16px 36px;
      cursor: pointer;
      letter-spacing: 2px;
      text-transform: uppercase;
      box-shadow: 0 0 20px rgba(192,57,43,0.4);
    }

    /* A cena A-Frame fica oculta até ativar */
    a-scene {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 10;
    }

    a-scene.active { display: block; }

    #hud {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
      padding: 16px 20px;
      background: linear-gradient(to bottom, rgba(10,21,16,0.85), transparent);
      align-items: center;
      justify-content: space-between;
    }

    #hud.active { display: flex; }

    .hud-title {
      font-family: 'Cinzel Decorative', cursive;
      font-size: 0.8rem;
      color: #f0d080;
      letter-spacing: 2px;
    }

    .hud-creature {
      font-family: 'Cinzel Decorative', cursive;
      font-size: 0.75rem;
      color: #c0392b;
      letter-spacing: 2px;
    }

    #scan-hint {
      display: none;
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      font-style: italic;
      font-size: 0.85rem;
      color: rgba(242,232,213,0.7);
      text-align: center;
      white-space: nowrap;
      transition: opacity 0.5s;
    }

    #scan-hint.active { display: block; }

    #backBtn {
      display: none;
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      background: rgba(10,21,16,0.85);
      color: rgba(242,232,213,0.7);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 4px;
      font-family: 'Cinzel Decorative', cursive;
      font-size: 0.65rem;
      padding: 10px 22px;
      cursor: pointer;
      letter-spacing: 2px;
    }

    #backBtn.active { display: block; }
  </style>
</head>
<body>

  <div id="intro">
    <div class="logo">Bestiário<br/><span>BR</span></div>
    <div class="criatura">✦ Saci ✦</div>
    <img class="card-preview" src="saci-card.jpg" alt="Carta do Saci" />
    <p class="instrucao">Aponte a câmera para a carta do Saci para invocar a criatura em Realidade Aumentada.</p>
    <button class="start-btn" id="startBtn">◈ Ativar Câmera</button>
  </div>

  <div id="hud">
    <div class="hud-title">Bestiário BR</div>
    <div class="hud-creature">Saci</div>
  </div>

  <div id="scan-hint">📷 Aponte para a carta do Saci…</div>

  <a-scene
    id="arScene"
    mindar-image="imageTargetSrc: saci-target.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no; filterMinCF: 0.0001; filterBeta: 0.001;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <a-asset-item id="saciModel" src="saci.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
     <a-entity
     gltf-model="#saciModel"
     position="0 0.3 0"
     rotation="90 0 0"
     scale="15  15  15"
     gesture-handler="minScale: 0.5; maxScale: 10">
     </a-entity>
     </a-entity>

  </a-scene>

  <button id="backBtn" onclick="stopAR()">✕ Voltar</button>

  <script>
    const startBtn = document.getElementById('startBtn');
    const arScene  = document.getElementById('arScene');
    const intro    = document.getElementById('intro');
    const hud      = document.getElementById('hud');
    const hint     = document.getElementById('scan-hint');
    const backBtn  = document.getElementById('backBtn');

    startBtn.addEventListener('click', () => {
      // Mostra a cena
      intro.style.display = 'none';
      arScene.classList.add('active');
      hud.classList.add('active');
      hint.classList.add('active');
      backBtn.classList.add('active');

      // Inicia o MindAR após a cena estar pronta
      arScene.addEventListener('loaded', () => {
        const arSystem = arScene.systems['mindar-image-system'];
        if (arSystem) arSystem.start();
      }, { once: true });

      // Se a cena já estiver carregada
      if (arScene.hasLoaded) {
        const arSystem = arScene.systems['mindar-image-system'];
        if (arSystem) arSystem.start();
      }
    });

    function stopAR() {
      const arSystem = arScene.systems['mindar-image-system'];
      if (arSystem) arSystem.stop();

      arScene.classList.remove('active');
      hud.classList.remove('active');
      hint.classList.remove('active');
      backBtn.classList.remove('active');
      intro.style.display = 'flex';
    }

    // Feedback visual ao encontrar/perder a carta
    arScene.addEventListener('loaded', () => {
      const target = document.querySelector('[mindar-image-target]');
      if (target) {
        target.addEventListener('targetFound', () => { hint.style.opacity = '0'; });
        target.addEventListener('targetLost',  () => { hint.style.opacity = '1'; });
      }
    });
  </script>

</body>
</html>
